services:
  backend:
    build:
      context: ./express
      dockerfile: Dockerfile
    env_file:
      - ./express/.env
    environment:
      NODE_ENV: production
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - mern-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge